<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Connecting...</title>
  <style>
    body { background: #0a0a0a; color: #f0f0f0; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #2a2a2a; border-top-color: #00e5a0; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #666; font-size: 14px; }
    pre { background:#111;padding:16px;border-radius:8px;font-size:11px;color:#f0f0f0;max-width:600px;overflow-wrap:break-word;white-space:pre-wrap;margin-top:16px;text-align:left; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <p id="status">Connecting to QuickBooks...</p>
  <script>
    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const realmId = params.get('realmId');

      if (!code || !realmId) {
        window.location.href = 'index.html';
        return;
      }

      // Guard against double execution
      const codeKey = 'processing_' + code.substring(0, 20);
      if (sessionStorage.getItem(codeKey)) {
        window.location.href = 'index.html';
        return;
      }
      sessionStorage.setItem(codeKey, '1');
      window.history.replaceState({}, document.title, window.location.pathname);

      const saved = localStorage.getItem('tbm_credentials');
      if (!saved) {
        window.location.href = 'index.html';
        return;
      }

      const creds = JSON.parse(saved);
      creds.realmId = realmId;
      localStorage.setItem('tbm_credentials', JSON.stringify(creds));

      document.getElementById('status').textContent = 'Exchanging token with Intuit...';

      const redirectUri = 'https://perditusanimus.github.io/tbm-fleet-legal/callback.html';
      const basicAuth = btoa(creds.clientId + ':' + creds.clientSecret);
      const formBody = 'grant_type=authorization_code&code=' + encodeURIComponent(code) + '&redirect_uri=' + encodeURIComponent(redirectUri);

      try {
        // Call Intuit directly — bypass the Worker for auth
        const response = await fetch('https://oauth2.platform.intuit.com/oauth2/v1/tokens/bearer', {
          method: 'POST',
          headers: {
            'Authorization': 'Basic ' + basicAuth,
            'Content-Type': 'application/x-www-form-urlencoded',
            'Accept': 'application/json'
          },
          body: formBody
        });

        const data = await response.json();

        if (data.access_token) {
          localStorage.setItem('tbm_access_token', data.access_token);
          if (data.refresh_token) localStorage.setItem('tbm_refresh_token', data.refresh_token);
          document.getElementById('status').textContent = '✓ Connected!';
          window.location.href = 'index.html';
        } else {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('status').style.color = '#ff4d4d';
          document.getElementById('status').textContent = 'Auth failed:';
          const pre = document.createElement('pre');
          pre.textContent = JSON.stringify(data, null, 2);
          document.body.appendChild(pre);
        }
      } catch(err) {
        // If direct call fails due to CORS, fall back to Worker
        document.getElementById('status').textContent = 'Trying via proxy...';
        try {
          const r2 = await fetch('https://tbm-fleet-auth.mikasafanboy101.workers.dev/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'auth', code, clientId: creds.clientId,
              clientSecret: creds.clientSecret, redirectUri,
              grantType: 'authorization_code'
            })
          });
          const d2 = await r2.json();
          if (d2.access_token) {
            localStorage.setItem('tbm_access_token', d2.access_token);
            if (d2.refresh_token) localStorage.setItem('tbm_refresh_token', d2.refresh_token);
            window.location.href = 'index.html';
          } else {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status').style.color = '#ff4d4d';
            document.getElementById('status').textContent = 'Auth failed:';
            const pre = document.createElement('pre');
            pre.textContent = JSON.stringify(d2, null, 2);
            document.body.appendChild(pre);
          }
        } catch(e2) {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('status').style.color = '#ff4d4d';
          document.getElementById('status').textContent = 'Both methods failed: ' + e2.message;
        }
      }
    }
    handleCallback();
  </script>
</body>
</html>
